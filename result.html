<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>낚시 배 좌석 배정</title>
  <link rel="stylesheet" href="styles.css">
  <script defer src="app.js"></script>
</head>
<body class="page-shell page-result">
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>
  <div class="bg-grid"></div>

  <main class="app-frame result-frame">
    <header class="result-header glass">
      <div>        
        <h1>좌석 배정 결과</h1>        
      </div>
      <div class="header-actions">
        <a class="ghost-btn link-btn" href="index.html">설정으로 돌아가기</a>
      </div>
    </header>

    <section class="result-summary-grid">
      <article class="glass stat-card">
        <span>전체 좌석</span>
        <strong id="totalSeatStat">0</strong>
      </article>
      <article class="glass stat-card">
        <span>배정 인원</span>
        <strong id="assignedPeopleStat">0</strong>
      </article>
      <article class="glass stat-card">
        <span>분리 좌석</span>
        <strong id="separatedSeatStat">0</strong>
      </article>
    </section>

    <section class="result-layout">
      <aside class="glass panel map-panel">
        <div class="panel-head">
          <h2>좌석 맵</h2>          
        </div>
        <div id="seatMap" class="seat-map"></div>
      </aside>

      <div class="glass panel result-panel">
        <div class="panel-head">
          <h2>좌석 목록</h2>
          <p>팀(가족)은 이웃하는 좌석을 배정 받기 위해 분리 좌석 양쪽을 모두 배정 받을수 없습니다.</p>
        </div>
        <div id="seatList" class="seat-list"></div>
      </div>
    </section>
  </main>
</body>
</html>
